# Faintech Lab - Basic CI Check
name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  baseline-check:
    name: Baseline Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          echo "Validating JSON files..."
          find . -name "*.json" -type f | while read file; do
            echo "Checking $file..."
            jq empty "$file" || exit 1
          done
          echo "All JSON files are valid"

      - name: Validate Markdown files (basic)
        run: |
          echo "Validating Markdown files..."
          # Basic check for common Markdown files
          find . -name "*.md" -type f | head -20 | while read file; do
            echo "Checking $file..."
            # Just verify files are readable and not empty
            if [ -s "$file" ]; then
              echo "  ✓ $file exists and is not empty"
            fi
          done
          echo "Markdown validation complete"

      - name: Repository health check
        run: |
          echo "Running repository health checks..."
          echo "Repository structure:"
          ls -la
          echo ""
          echo "Key directories:"
          [ -d ".github" ] && echo "  ✓ .github exists"
          [ -d "docs" ] && echo "  ✓ docs exists"
          echo ""
          echo "Repository is healthy"

      - name: Secrets detection (TruffleHog)
        run: |
          echo "Running secrets detection..."
          # Install TruffleHog
          pip install trufflehog

          # Scan for secrets
          trufflehog filesystem --directory . --json | tee trufflehog-results.json

          # Check if any secrets were found
          if [ -s trufflehog-results.json ] && [ "$(cat trufflehog-results.json | jq '.FoundResults | length')" -gt 0 ]; then
            echo "❌ Secrets detected in repository!"
            cat trufflehog-results.json | jq '.FoundResults[] | {path, strings, reason}'
            exit 1
          else
            echo "✓ No secrets detected"
          fi
