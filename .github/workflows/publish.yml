name: Publish SDKs

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      sdk:
        description: 'SDK to publish (python|typescript|all)'
        required: true
        default: 'all'

jobs:
  publish-python:
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.sdk == 'python' || github.event.inputs.sdk == 'all'))
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build Python SDK
        run: |
          cd sdks/python
          python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          cd sdks/python
          twine upload dist/*

  publish-typescript:
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.sdk == 'typescript' || github.event.inputs.sdk == 'all'))
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: |
          cd sdks/typescript
          npm ci

      - name: Build TypeScript SDK
        run: |
          cd sdks/typescript
          npm run build

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd sdks/typescript
          npm publish --access public

  notify:
    runs-on: ubuntu-latest
    needs: [publish-python, publish-typescript]
    if: always()
    steps:
      - name: Notify on success
        if: success()
        run: |
          echo "✅ SDK publishing completed successfully"
          # Add Slack/Discord notification here if needed

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ SDK publishing failed"
          # Add Slack/Discord notification here if needed
