name: SDK Integration Tests

on:
  push:
    branches: [master, main, develop]
    paths:
      - 'sdks/**'
      - '.github/workflows/sdk-tests.yml'
  pull_request:
    branches: [master, main, develop]
    paths:
      - 'sdks/**'
      - '.github/workflows/sdk-tests.yml'
  workflow_dispatch:

jobs:
  python-sdk-tests:
    name: Python SDK Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx pydantic pytest pytest-asyncio pytest-cov
          pip install -e sdks/python/

      - name: Run Python SDK integration tests
        run: |
          cd sdks/python
          pytest tests/test_integration.py -v --cov=agentmemory --cov-report=xml --cov-report=html

      - name: Upload Python coverage reports
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./sdks/python/coverage.xml
          flags: python-sdk
          name: Python SDK Coverage

  typescript-sdk-tests:
    name: TypeScript SDK Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sdks/typescript

      - name: Install TypeScript dependencies
        run: |
          cd sdks/typescript
          npm ci

      - name: Build TypeScript SDK
        run: |
          cd sdks/typescript
          npm run build

      - name: Run TypeScript SDK integration tests
        run: |
          cd sdks/typescript
          npm test -- --coverage

      - name: Upload TypeScript coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: ./sdks/typescript/coverage/coverage-final.json
          flags: typescript-sdk
          name: TypeScript SDK Coverage

  backend-for-tests:
    name: Start Backend for Tests
    runs-on: ubuntu-latest
    outputs:
      backend-url: ${{ steps.start.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r amc-backend/requirements.txt

      - name: Start backend server
        id: start
        run: |
          cd amc-backend
          # Create test database
          sqlite3 /tmp/test_amc.db < /dev/null || true

          # Start server in background
          python main.py &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_OUTPUT

          # Wait for server to be ready
          for i in {1..30}; do
            if curl -s http://localhost:8000/health > /dev/null; then
              echo "Server is ready"
              echo "url=http://localhost:8000/api/v1" >> $GITHUB_OUTPUT
              break
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done

          # Keep server running for test jobs
          trap "kill $SERVER_PID" EXIT
          sleep 60

  python-sdk-integration:
    name: Python SDK Integration Tests (with backend)
    runs-on: ubuntu-latest
    needs: backend-for-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python SDK and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx pydantic pytest pytest-asyncio

      - name: Create API key
        run: |
          echo "AGENT_MEMORY_API_KEY=test-integration-key" >> $GITHUB_ENV

      - name: Run Python SDK integration tests
        env:
          AGENT_MEMORY_BASE_URL: ${{ needs.backend-for-tests.outputs.backend-url }}
        run: |
          cd sdks/python
          pytest tests/test_integration.py -v --tb=short

  typescript-sdk-integration:
    name: TypeScript SDK Integration Tests (with backend)
    runs-on: ubuntu-latest
    needs: backend-for-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install TypeScript dependencies
        run: |
          cd sdks/typescript
          npm ci

      - name: Run TypeScript SDK integration tests
        env:
          AGENT_MEMORY_API_KEY: test-integration-key
          AGENT_MEMORY_BASE_URL: ${{ needs.backend-for-tests.outputs.backend-url }}
        run: |
          cd sdks/typescript
          npm test

  test-report:
    name: Test Results Summary
    runs-on: ubuntu-latest
    needs: [python-sdk-tests, typescript-sdk-tests]
    if: always()

    steps:
      - name: Check test results
        run: |
          echo "All test jobs completed"
          echo "Python SDK: ${{ needs.python-sdk-tests.result }}"
          echo "TypeScript SDK: ${{ needs.typescript-sdk-tests.result }}"
