# Docker Compose for PostgreSQL + pgvector Load Testing
# Usage: docker-compose -f docker-compose.loadtest.yml up -d

version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg15
    container_name: amc-pgvector-loadtest
    environment:
      - POSTGRES_USER=amc
      - POSTGRES_PASSWORD=amc_password
      - POSTGRES_DB=amc
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amc"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgvector_data:
