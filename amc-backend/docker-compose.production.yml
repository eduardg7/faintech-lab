version: "3.9"

services:
  amc-backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: amc-backend:prod
    container_name: amc-backend
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
