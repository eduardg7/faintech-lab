global:
  resolve_timeout: 5m

route:
  receiver: amc-ops
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h
  routes:
    - matchers:
        - severity="p0"
      receiver: amc-incident

receivers:
  - name: amc-ops
    webhook_configs:
      - url: ${ALERTMANAGER_SLACK_WEBHOOK_URL}
        send_resolved: true

  - name: amc-incident
    webhook_configs:
      - url: ${ALERTMANAGER_SLACK_INCIDENT_WEBHOOK_URL}
        send_resolved: true
