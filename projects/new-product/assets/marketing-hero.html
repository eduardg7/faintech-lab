<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMC Marketing Hero</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
    }
    .hero {
      width: 1920px;
      height: 1080px;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 60px;
    }

    /* Animated network effect */
    .network {
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background: radial-gradient(circle at center, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
      background-size: 30px 30px;
      animation: networkFloat 30s linear infinite;
    }

    @keyframes networkFloat {
      0% { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(30px, 30px) rotate(360deg); }
    }

    /* Connection lines */
    .connections {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
    }

    .connection {
      position: absolute;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.4), transparent);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.6; }
    }

    /* Floating memory nodes */
    .node {
      position: absolute;
      border-radius: 50%;
      background: linear-gradient(135deg, #3B82F6, #8B5CF6);
      box-shadow: 0 0 30px rgba(59, 130, 246, 0.4);
      animation: float 6s ease-in-out infinite;
    }

    .node::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: white;
      opacity: 0.8;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    /* Main content */
    .content {
      position: relative;
      z-index: 10;
      text-align: center;
    }

    .logo {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 50px 80px;
      display: inline-block;
      margin-bottom: 40px;
      box-shadow:
        0 25px 50px rgba(0, 0, 0, 0.3),
        0 0 0 1px rgba(255, 255, 255, 0.05);
    }

    .logo-text {
      font-size: 100px;
      font-weight: 800;
      background: linear-gradient(135deg, #3B82F6 0%, #8B5CF6 50%, #EC4899 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -3px;
    }

    .tagline-container {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .tagline {
      font-size: 48px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.5px;
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    .subtitle {
      font-size: 24px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 1px;
    }

    /* CTA badge */
    .cta-badge {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #3B82F6, #8B5CF6);
      color: white;
      padding: 16px 32px;
      border-radius: 50px;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.5px;
      box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
    }

    /* Node positions */
    .node-1 { width: 80px; height: 80px; top: 15%; left: 10%; animation-delay: 0s; }
    .node-2 { width: 60px; height: 60px; top: 25%; left: 80%; animation-delay: 1s; }
    .node-3 { width: 70px; height: 70px; top: 70%; left: 15%; animation-delay: 2s; }
    .node-4 { width: 90px; height: 90px; top: 75%; left: 70%; animation-delay: 0.5s; }
    .node-5 { width: 50px; height: 50px; top: 40%; left: 50%; animation-delay: 1.5s; }

    /* Connection lines */
    .line-1 { width: 200px; top: 20%; left: 20%; transform: rotate(15deg); }
    .line-2 { width: 300px; top: 30%; left: 60%; transform: rotate(-10deg); }
    .line-3 { width: 250px; top: 65%; left: 25%; transform: rotate(25deg); }
    .line-4 { width: 180px; top: 72%; left: 55%; transform: rotate(-15deg); }
    .line-5 { width: 150px; top: 45%; left: 40%; transform: rotate(5deg); }
  </style>
</head>
<body>
  <div class="hero">
    <!-- Background network -->
    <div class="network"></div>

    <!-- Connection lines -->
    <div class="connections">
      <div class="connection line-1"></div>
      <div class="connection line-2"></div>
      <div class="connection line-3"></div>
      <div class="connection line-4"></div>
      <div class="connection line-5"></div>
    </div>

    <!-- Floating nodes -->
    <div class="node node-1"></div>
    <div class="node node-2"></div>
    <div class="node node-3"></div>
    <div class="node node-4"></div>
    <div class="node node-5"></div>

    <!-- Main content -->
    <div class="content">
      <div class="logo">
        <div class="logo-text">AMC</div>
      </div>

      <div class="tagline-container">
        <div class="tagline">Agent Memory Cloud</div>
        <div class="subtitle">Persistent memory for AI agents at scale</div>
      </div>
    </div>

    <!-- CTA badge -->
    <div class="cta-badge">Join Beta • March 24</div>
  </div>
</body>
</html>
