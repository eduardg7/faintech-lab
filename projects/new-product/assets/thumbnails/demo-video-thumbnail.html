<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMC Demo Video Thumbnail</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
    }
    .thumbnail {
      width: 1280px;
      height: 720px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Animated background elements */
    .bg-grid {
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background-image:
        linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
    }

    @keyframes gridMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(40px, 40px); }
    }

    /* Glowing orb effects */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.6;
    }

    .orb-1 {
      width: 300px;
      height: 300px;
      background: #3B82F6;
      top: -100px;
      right: -50px;
      animation: float1 8s ease-in-out infinite;
    }

    .orb-2 {
      width: 200px;
      height: 200px;
      background: #8B5CF6;
      bottom: -50px;
      left: -50px;
      animation: float2 10s ease-in-out infinite;
    }

    .orb-3 {
      width: 150px;
      height: 150px;
      background: #EC4899;
      top: 50%;
      left: 50%;
      animation: float3 12s ease-in-out infinite;
    }

    @keyframes float1 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(30px, 20px); }
    }

    @keyframes float2 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-20px, 30px); }
    }

    @keyframes float3 {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.4; }
      50% { transform: translate(-45%, -55%) scale(1.2); opacity: 0.6; }
    }

    /* Main content */
    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }

    .logo-container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 40px 60px;
      box-shadow:
        0 25px 50px -12px rgba(0, 0, 0, 0.5),
        0 0 0 1px rgba(255, 255, 255, 0.1);
    }

    .logo-text {
      font-size: 80px;
      font-weight: 800;
      background: linear-gradient(135deg, #3B82F6 0%, #8B5CF6 50%, #EC4899 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -2px;
    }

    .title-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .main-title {
      font-size: 48px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.5px;
      text-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
    }

    .subtitle {
      font-size: 24px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 1px;
    }

    /* Badge */
    .badge {
      position: absolute;
      top: 40px;
      right: 40px;
      background: linear-gradient(135deg, #3B82F6, #8B5CF6);
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.5px;
      box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
    }

    /* Duration badge */
    .duration {
      position: absolute;
      bottom: 40px;
      right: 40px;
      background: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      backdrop-filter: blur(10px);
    }
  </style>
</head>
<body>
  <div class="thumbnail">
    <!-- Background effects -->
    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Badge -->
    <div class="badge">BETA</div>

    <!-- Main content -->
    <div class="content">
      <div class="logo-container">
        <div class="logo-text">AMC</div>
      </div>

      <div class="title-container">
        <div class="main-title">Agent Memory Cloud</div>
        <div class="subtitle">Persistent memory for AI agents at scale</div>
      </div>
    </div>

    <!-- Duration badge -->
    <div class="duration">5:00</div>
  </div>
</body>
</html>
